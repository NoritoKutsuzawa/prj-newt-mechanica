<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newt Mechanica Games</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #111827;
      color: #f3f4f6;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }
    h1 { margin-top: 0; }
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 16px;
    }
    a.card:hover { border-color: #60a5fa; }
    .name { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .desc { margin: 0; color: #d1d5db; font-size: 0.95rem; }
  </style>
</head>
<body>
  <main>
    <h1>Newt Mechanica Browser Games</h1>
    <p>作成したゲームをこのトップページから遊べます。</p>
    <section class="games">
      <a class="card" href="./games/shooting/index.html">
        <div class="name">Shooting Game</div>
        <p class="desc">矢印キーで移動、Space でショット。敵を倒してスコアを伸ばす。</p>
      </a>
      <a class="card" href="./games/reflex/index.html">
        <div class="name">Reflex Click Game</div>
        <p class="desc">動くターゲットをクリックして反射神経チャレンジ。</p>
      </a>
    </section>
  </main>
</body>
</html>
